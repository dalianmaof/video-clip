name: Build & Release

on:
  push:
    branches: [master, feat/*]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

env:
  FFMPEG_VERSION: "7.1"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Download ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n${{ env.FFMPEG_VERSION }}-latest-win64-gpl-${{ env.FFMPEG_VERSION }}.zip"
          $fallback = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "ffmpeg.zip"

          try {
            Invoke-WebRequest -Uri $url -OutFile $zip -MaximumRedirection 5
          } catch {
            Write-Host "Primary URL failed, using fallback..."
            Invoke-WebRequest -Uri $fallback -OutFile $zip -MaximumRedirection 5
          }

          Expand-Archive -Path $zip -DestinationPath ffmpeg-tmp -Force
          $binDir = Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffmpegDir = $binDir.DirectoryName

          # Place ffmpeg where the Rust code can find it via resource bundling
          New-Item -ItemType Directory -Force -Path "tools/ffmpeg"
          Copy-Item "$ffmpegDir/ffmpeg.exe"  "tools/ffmpeg/"
          Copy-Item "$ffmpegDir/ffprobe.exe" "tools/ffmpeg/"

          Remove-Item -Recurse ffmpeg-tmp, $zip -Force
          Write-Host "ffmpeg installed at tools/ffmpeg/"
          & "tools/ffmpeg/ffmpeg.exe" -version | Select-Object -First 1

      - name: Build Tauri app
        run: npm run tauri build

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Recurse |
            Select-Object FullName, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,1)}}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
          draft: false
