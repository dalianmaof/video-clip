<svg width="100%" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Video batch processor delivery design">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182235"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 30px "Inter", "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 14px "Inter", "Segoe UI", Arial, sans-serif; fill: #cbd5e1; }
      .section { font: 700 16px "Inter", "Segoe UI", Arial, sans-serif; fill: #e2e8f0; letter-spacing: 0.04em; }
      .label { font: 700 18px "Inter", "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .body { font: 400 14px "Inter", "Segoe UI", Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 400 12px "Inter", "Segoe UI", Arial, sans-serif; fill: #94a3b8; }
      .chip { font: 700 12px "Inter", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="820" fill="url(#bg)"/>
  <circle cx="1060" cy="100" r="120" fill="#22c55e" opacity="0.08"/>
  <circle cx="160" cy="690" r="180" fill="#38bdf8" opacity="0.08"/>
  <circle cx="930" cy="680" r="220" fill="#a78bfa" opacity="0.08"/>

  <text x="60" y="62" class="title">Video Batch Processor Design</text>
  <text x="60" y="88" class="subtitle">Delivery-first workflow: detect parameters, validate crop, run batch, resume safely, hand off MP4s and logs.</text>

  <!-- Lane headers -->
  <g filter="url(#shadow)">
    <rect x="50" y="120" width="340" height="620" rx="24" fill="url(#card)" stroke="#334155"/>
    <rect x="430" y="120" width="340" height="620" rx="24" fill="url(#card)" stroke="#334155"/>
    <rect x="810" y="120" width="340" height="620" rx="24" fill="url(#card)" stroke="#334155"/>
  </g>

  <text x="220" y="158" text-anchor="middle" class="section">01  DISCOVER</text>
  <text x="600" y="158" text-anchor="middle" class="section">02  PROCESS</text>
  <text x="980" y="158" text-anchor="middle" class="section">03  DELIVER</text>

  <!-- Left lane -->
  <g filter="url(#shadow)">
    <rect x="80" y="190" width="280" height="88" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="1.4"/>
    <rect x="80" y="300" width="280" height="88" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="1.4"/>
    <rect x="80" y="410" width="280" height="88" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="1.4"/>
    <rect x="80" y="520" width="280" height="88" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="1.4"/>
  </g>

  <rect x="104" y="214" width="68" height="24" rx="12" fill="#7dd3fc"/>
  <text x="138" y="231" text-anchor="middle" class="chip">INPUT</text>
  <text x="190" y="228" class="label">Sample video</text>
  <text x="104" y="252" class="body">TS / M2TS source directory</text>

  <rect x="104" y="324" width="68" height="24" rx="12" fill="#7dd3fc"/>
  <text x="138" y="341" text-anchor="middle" class="chip">PROBE</text>
  <text x="190" y="338" class="label">detect_params.py</text>
  <text x="104" y="362" class="body">Resolution, FPS, codecs, bitrate</text>

  <rect x="104" y="434" width="68" height="24" rx="12" fill="#7dd3fc"/>
  <text x="138" y="451" text-anchor="middle" class="chip">CHECK</text>
  <text x="190" y="448" class="label">Subtitle strip</text>
  <text x="104" y="472" class="body">Frame grabs + 3x bottom strip</text>

  <rect x="104" y="544" width="68" height="24" rx="12" fill="#7dd3fc"/>
  <text x="138" y="561" text-anchor="middle" class="chip">FREEZE</text>
  <text x="190" y="558" class="label">CONFIG lock-in</text>
  <text x="104" y="582" class="body">crop=1920:980:0:0, scale=1920:1080</text>

  <!-- Middle lane -->
  <g filter="url(#shadow)">
    <rect x="460" y="190" width="280" height="88" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="1.4"/>
    <rect x="460" y="300" width="280" height="88" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="1.4"/>
    <rect x="460" y="410" width="280" height="88" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="1.4"/>
    <rect x="460" y="520" width="280" height="88" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="1.4"/>
  </g>

  <rect x="484" y="214" width="74" height="24" rx="12" fill="#ddd6fe"/>
  <text x="521" y="231" text-anchor="middle" class="chip">FAST</text>
  <text x="570" y="228" class="label">Quick validation</text>
  <text x="484" y="252" class="body">NVENC, limit 10, inspect crop</text>

  <rect x="484" y="324" width="74" height="24" rx="12" fill="#ddd6fe"/>
  <text x="521" y="341" text-anchor="middle" class="chip">FULL</text>
  <text x="570" y="338" class="label">Production batch</text>
  <text x="484" y="362" class="body">libx264, CRF 18, preset slow</text>

  <rect x="484" y="434" width="74" height="24" rx="12" fill="#ddd6fe"/>
  <text x="521" y="451" text-anchor="middle" class="chip">STATE</text>
  <text x="570" y="448" class="label">SQLite resume</text>
  <text x="484" y="472" class="body">pending / processing / done / failed</text>

  <rect x="484" y="544" width="74" height="24" rx="12" fill="#ddd6fe"/>
  <text x="521" y="561" text-anchor="middle" class="chip">LOG</text>
  <text x="570" y="558" class="label">Status &amp; progress</text>
  <text x="484" y="582" class="body">--status, --dry-run, Ctrl+C resume</text>

  <!-- Right lane -->
  <g filter="url(#shadow)">
    <rect x="840" y="190" width="280" height="88" rx="18" fill="#0f172a" stroke="#22c55e" stroke-width="1.4"/>
    <rect x="840" y="300" width="280" height="88" rx="18" fill="#0f172a" stroke="#22c55e" stroke-width="1.4"/>
    <rect x="840" y="410" width="280" height="88" rx="18" fill="#0f172a" stroke="#22c55e" stroke-width="1.4"/>
    <rect x="840" y="520" width="280" height="88" rx="18" fill="#0f172a" stroke="#22c55e" stroke-width="1.4"/>
  </g>

  <rect x="864" y="214" width="70" height="24" rx="12" fill="#86efac"/>
  <text x="899" y="231" text-anchor="middle" class="chip">OUTPUT</text>
  <text x="948" y="228" class="label">MP4 files</text>
  <text x="864" y="252" class="body">Clean subtitle-free encodes</text>

  <rect x="864" y="324" width="70" height="24" rx="12" fill="#86efac"/>
  <text x="899" y="341" text-anchor="middle" class="chip">QA</text>
  <text x="948" y="338" class="label">Visual check</text>
  <text x="864" y="362" class="body">Open a few outputs and inspect</text>

  <rect x="864" y="434" width="70" height="24" rx="12" fill="#86efac"/>
  <text x="899" y="451" text-anchor="middle" class="chip">DONE</text>
  <text x="948" y="448" class="label">Skip completed</text>
  <text x="864" y="472" class="body">Rerun safely after crash/interrupt</text>

  <rect x="864" y="544" width="70" height="24" rx="12" fill="#86efac"/>
  <text x="899" y="561" text-anchor="middle" class="chip">DELIVER</text>
  <text x="948" y="558" class="label">Handoff package</text>
  <text x="864" y="582" class="body">MP4s + logs + failed-file list</text>

  <!-- Arrows between lanes -->
  <line x1="360" y1="234" x2="430" y2="234" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="360" y1="344" x2="430" y2="344" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="360" y1="454" x2="430" y2="454" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="360" y1="564" x2="430" y2="564" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>

  <line x1="740" y1="234" x2="810" y2="234" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="740" y1="344" x2="810" y2="344" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="740" y1="454" x2="810" y2="454" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="740" y1="564" x2="810" y2="564" stroke="url(#accent)" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- Footer guidance -->
  <g filter="url(#shadow)">
    <rect x="50" y="760" width="1100" height="40" rx="12" fill="#0f172a" stroke="#334155"/>
  </g>
  <text x="70" y="785" class="small">
    Delivery notes: fast mode for validation only, quality mode for final export, SQLite marks failed files without blocking the rest, and completed files are skipped on rerun.
  </text>
</svg>
